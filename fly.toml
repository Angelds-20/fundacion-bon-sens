# fly.toml configuration file for Fly.io deployment
app = "fundacion-bon-sens"
primary_region = "scl" # Santiago, Chile (recommended for Talca)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Keep at least 1 machine running to prevent cold starts
  processes = ["app"]

# Mount persistent volume to prevent SQLite data loss
[[mounts]]
  source = "bonsens_data"
  destination = "/var/www/html/data"

[env]
  BASE_URL = "https://fundacion-bon-sens.fly.dev"
  DB_PATH = "/var/www/html/data/bonsens.db"
